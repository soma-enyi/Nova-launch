name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Rust contract tests
  rust-tests:
    name: Rust Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts/token-factory
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt, clippy
          target: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: contracts/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --lib -- -D warnings

      - name: Run tests
        run: cargo test --lib

      - name: Build contract
        run: cargo build --release --target wasm32-unknown-unknown

  # Frontend tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Run cargo audit
        uses: actions-rs/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # Check spec files are valid
  spec-validation:
    name: Validate Spec Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check spec files exist
        run: |
          if [ -d ".nova/specs" ]; then
            echo "✓ Specs directory exists"
            for spec_dir in .nova/specs/*/; do
              if [ -d "$spec_dir" ]; then
                spec_name=$(basename "$spec_dir")
                echo "Checking spec: $spec_name"
                
                # Check for required files
                if [ ! -f "${spec_dir}requirements.md" ]; then
                  echo "✗ Missing requirements.md in $spec_name"
                  exit 1
                fi
                
                if [ ! -f "${spec_dir}design.md" ]; then
                  echo "✗ Missing design.md in $spec_name"
                  exit 1
                fi
                
                if [ ! -f "${spec_dir}tasks.md" ]; then
                  echo "✗ Missing tasks.md in $spec_name"
                  exit 1
                fi
                
                echo "✓ Spec $spec_name is valid"
              fi
            done
          else
            echo "No specs directory found, skipping validation"
          fi

  # All checks must pass
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [rust-tests, frontend-tests, security-audit, spec-validation]
    
    steps:
      - name: Success
        run: echo "All CI checks passed successfully!"
